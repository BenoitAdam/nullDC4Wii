;; NullDC4Wii - Game Presets Configuration
;; Place this file at: sd:/data/game_presets.cfg
;;
;; HOW IT WORKS:
;;   Each [keyword] is matched case-insensitively as a substring of the disc filename.
;;   The FIRST matching rule wins — put more specific entries BEFORE general ones.
;;   Only fields you list are changed; everything else keeps the user's UI selection.
;;   The options menu opens AFTER the preset is applied, so users can still override.
;;
;; SETTINGS REFERENCE:
;;   accuracy    = fast | balanced | accurate
;;   graphics    = low | normal | high | extra
;;   ratio       = original | fullscreen
;;   adv_alpha   = 0 | 1
;;   frameskip   = 0 | 1 | 2 | auto
;;   tex_cache   = very_fast | fast | normal | quality
;;   ppz_write   = 0 | 1   (PVR Polygon-List Z write fix — Test Drive 6, Demolition Racer)
;;   4bpp        = i4_stub | 4bpp_optimized | ci4_fast | ci4_normal | rgb565
;;   8bpp        = i8_stub | 8bpp_optimized | ci8_fast | ci8_normal | rgb565
;;   players     = 1 | 2
;;   controller  = standard | lightgun | maracas | keyboard | fishingrod
;;   framebuffer_2d = 0 | 1   (2D Framebuffer rendering — try for 2D games)
;;   fmv_format     = cmpr | rgba8 | rgb565   (FMV/YUV422 texture upload format)
;;   jojo_fix       = 0 | 1   (gxRend.cpp TLUT-reupload-skip + CACHE_FAST PalSelect-masking,
;;                             tuned for Jojo's Bizarre Adventure — off by default elsewhere)
;;   decal_alpha    = 0 | 1   (ShadInstr==2 DecalAlpha shading fix — GX_DECAL for correct
;;                             transparency vs legacy GX_MODULATE which is faster but wrong)
;;   speed_limiter  = 0 | 1   (caps emulation at real-hardware 100% speed; off by default
;;                             since the SH4 thread normally runs uncapped — use this for
;;                             games that visibly run too fast on light frames)
;;   vertex_color_fix = 0 | 1  (real PVR Intensity/Gouraud shading: multiplies each
;;                             vertex's intensity by the polygon's FaceColor instead of
;;                             rendering flat grayscale — off by default elsewhere;
;;                             Crazy Taxi needs this for its HUD arrow/dollar sign color)
;;   blend_mode      = 0 | 1   (per-polygon TSP SrcInstr/DstInstr blending for the
;;                             translucent list — 1 applies the polygon's actual blend
;;                             factors each frame (correct); 0 skips the override and
;;                             uses the GX default (legacy, but wrong for RE3))
;;   rgb565_opaque_alpha = 0 | 1  (force vertex alpha opaque for RGB565 (fmt1) textures.
;;                             1 (default): both ARGB1555 (fmt0) and RGB565 (fmt1) force
;;                             vertex alpha to 0xFF, matching existing behavior.
;;                             0: only ARGB1555 (fmt0) is forced opaque; RGB565 (fmt1)
;;                             uses vertex alpha as-is, allowing translucent RGB565 polys)
;;   blend_fps_boost = 0 | 1  (only takes effect when blend_mode=1. 1 skips the
;;                             alpha-test/ZCompLoc pass for every polygon outside the
;;                             translucent list, gaining a couple of FPS (e.g. Castlevania)
;;                             at the cost of incorrect alpha on some opaque/punch-through
;;                             polys. Default 0 (off, correct alpha).)
;;   trans_sort      = 0 | 1  (translucent depth sort. Real PVR autosorts translucent
;;                             pixels in hardware; 1 sorts the translucent strips
;;                             back-to-front before drawing, fixing wrong overlaps in
;;                             alpha-heavy scenes at some CPU cost per frame.
;;                             Default 0 (off, legacy submission-order draw).)
;;   split_screen    = 0 | 1  (split-screen multiplayer. 1 honors the PVR User Tile
;;                             Clip — per-polygon inside-clip rects that games like
;;                             Daytona USA multiplayer use to confine each player's
;;                             camera to its half of the screen within one render
;;                             pass. Default 0 (legacy: clips ignored, both views
;;                             draw fullscreen and only one player's view shows).)
;;   mipmap          = off | fast | trilinear  (GX mipmap generation. off (default):
;;                             legacy base-level-only, fastest. fast: generated mip
;;                             chain sampled with nearest-mip bilinear — cuts distant
;;                             shimmer at near-zero GPU cost. trilinear: best quality
;;                             but takes 2 texture cycles/texel on Hollywood, halving
;;                             texture fill rate — e.g. -40% FPS in Test Drive 6.)
;;   fixed_depth     = 0 | 1 | 2  (fixed depth projection. 0 (default): legacy
;;                             per-vertex min/max W tracking, fits the Z range to
;;                             the scene each frame. 1 (wide): skips that tracking,
;;                             fixed planes W=[0.0001..100000] — safe everywhere,
;;                             coarser Z (more Z-fighting risk). 2 (tight): fixed
;;                             planes W=[0.1..25000] — much finer Z, but geometry
;;                             outside that range clips. UNVERIFIED on real
;;                             hardware — test per-game before relying on it.)
;;
;; EXAMPLE FILENAMES THAT WOULD MATCH:
;;   [jojo]        matches  JoJos_Bizarre_Adventure.gdi  or  jojo_dc.cdi
;;   [daytonausa]  matches  DaytonaUSA.gdi  or  daytona_usa_2001.cdi
;; --------------------------------------------------------------------------

