;; NullDC4Wii - Game Presets Configuration
;; Place this file at: sd:/discs/game_presets.cfg
;;
;; HOW IT WORKS:
;;   Each [keyword] is matched case-insensitively as a substring of the disc filename.
;;   A section may list several aliases on one line — [name1][name2][name3] —
;;   and applies if ANY of them matches (e.g. [streetfighter32][doubleimpact]).
;;   The first alias is the name shown in the options menu. Up to 8 per section.
;;   The FIRST matching rule wins — put more specific entries BEFORE general ones.
;;   Only fields you list are changed; everything else keeps the user's UI selection.
;;   The options menu opens AFTER the preset is applied, so users can still override.
;;
;;   A section can ALSO carry <condition> groups, mixed with [alias] groups in
;;   any order — e.g. <wii u>[segatetris][sega tetris]. ALL <condition> groups
;;   on the line must hold, on top of the usual filename match, for the section
;;   to apply. The only condition today is <wii u> (or <wiiu>): true only on
;;   real Wii U hardware running vWii, false on a real Wii — so a real Wii just
;;   falls through to a plain (no-condition) section for the same game below it.
;;   Put the <wii u> section FIRST, same "more specific before general" rule:
;;
;;     <wii u>[segatetris][sega tetris] ; Wii U
;;     accuracy=accurate
;;
;;     [segatetris][sega tetris]        ; Wii (fallback for everyone else)
;;     accuracy=fast
;;
;; SETTINGS REFERENCE:
;;   accuracy    = fast | balanced | accurate
;;   graphics    = low | normal | high | extra
;;   ratio       = original | fullscreen | auto   (auto = match Wii system 4:3/16:9 aspect)
;;   adv_alpha   = on | off
;;   frameskip   = 0 | 1 | 2 | auto
;;   tex_cache   = very_fast | fast | normal | quality
;;   ppz_write   = on | off   (PVR Polygon-List Z write fix — Test Drive 6, Demolition Racer)
;;   4bpp        = i4_stub | 4bpp_optimized | ci4_fast | ci4_normal | rgb565
;;   8bpp        = i8_stub | 8bpp_optimized | ci8_fast | ci8_normal | rgb565
;;   players     = 1 | 2 | 3 | 4
;;   controller  = standard | lightgun | maracas | keyboard | fishingrod
;;   framebuffer_2d = on | off   (2D Framebuffer rendering — try for 2D games)
;;   fmv_format     = cmpr | rgba8 | rgb565   (FMV/YUV422 texture upload format)
;;   jojo_fix       = on | off   (gxRend.cpp TLUT-reupload-skip + CACHE_FAST PalSelect-masking,
;;                             tuned for Jojo's Bizarre Adventure — off by default elsewhere)
;;   decal_alpha    = on | off   (ShadInstr==2 DecalAlpha shading fix — GX_DECAL for correct
;;                             transparency vs legacy GX_MODULATE which is faster but wrong)
;;   speed_limiter  = on | off   (caps emulation at real-hardware 100% speed; off by default
;;                             since the SH4 thread normally runs uncapped — use this for
;;                             games that visibly run too fast on light frames)
;;   render_delay   = on | off   (hardware-like HOLLY IRQ delays. Games that pace
;;                             their main loop off the TA list-complete /
;;                             render-done interrupts break when those fire
;;                             instantly: speed reads >100% while only a few
;;                             frames per second render (Marvel vs Capcom 2,
;;                             "130% / 7 FPS"). on delays each list-complete
;;                             IRQ by 200 SH4 cycles and staggers render-done
;;                             ISP/TSP/Video at 800k/850k/900k cycles after
;;                             STARTRENDER, like real hardware. Default off.)
;;   jit_sbp        = 0 | 1 | 2  (JIT Stale Block Protection. Gates all defenses
;;                             against executing stale/self-modified SH4
;;                             translations: the boot-entry cache flush at the
;;                             IP.BIN -> game-binary transition, the runtime
;;                             block-check guard (re-checks the source byte at
;;                             block entry, 1 = known self-modifying addresses
;;                             like DOA2LE/Shenmue 1/2, 2 = every RAM block —
;;                             slow, diagnosis only), and the cache clear on a
;;                             guard failure. Default 1 (known). 0 reproduces
;;                             the legacy zero-protection behavior, for A/B
;;                             comparison only.)
;;   dma_fix        = on | off  (bundles the ch2/PVR/Sort/AICA-G2 DMA
;;                             correctness fixes ported from the verified-
;;                             working NullDC PSP port: correct CHCR TE/DE
;;                             writeback, no SB_C2DSTAT clobber, no bogus
;;                             PVR-DMA alignment check, the Sort-DMA link-
;;                             sentinel fix for WinCE games, and deferred
;;                             AICA G2-DMA completion + SB_E2ST. Default on.
;;                             off reproduces the legacy pre-fix behavior,
;;                             for A/B comparison only.)
;;   vertex_color_fix = on | off  (real PVR Intensity/Gouraud shading: multiplies each
;;                             vertex's intensity by the polygon's FaceColor instead of
;;                             rendering flat grayscale — off by default elsewhere;
;;                             Crazy Taxi needs this for its HUD arrow/dollar sign color)
;;   blend_mode      = on | off   (per-polygon TSP SrcInstr/DstInstr blending for the
;;                             translucent list — on applies the polygon's actual blend
;;                             factors each frame (correct); off skips the override and
;;                             uses the GX default (legacy, but wrong for RE3))
;;   rgb565_opaque_alpha = on | off  (force vertex alpha opaque for RGB565 (fmt1) textures.
;;                             on (default): both ARGB1555 (fmt0) and RGB565 (fmt1) force
;;                             vertex alpha to 0xFF, matching existing behavior.
;;                             off: only ARGB1555 (fmt0) is forced opaque; RGB565 (fmt1)
;;                             uses vertex alpha as-is, allowing translucent RGB565 polys)
;;   fps_boost       = on | off  (only takes effect when blend_mode=on. on skips the
;;                             alpha-test/ZCompLoc pass for every polygon outside the
;;                             translucent list, gaining a couple of FPS (e.g. Castlevania)
;;                             at the cost of incorrect alpha on some opaque/punch-through
;;                             polys. Default off (correct alpha).)
;;   trans_sort      = on | off  (translucent depth sort. Real PVR autosorts translucent
;;                             pixels in hardware; on sorts the translucent strips
;;                             back-to-front before drawing, fixing wrong overlaps in
;;                             alpha-heavy scenes at some CPU cost per frame.
;;                             Default off (legacy submission-order draw).)
;;   x_scaler        = on | off  (PVR horizontal X-scaler support. A few games
;;                             (Omicron The Nomad Soul, Wacky Races) render the
;;                             scene 1280 pixels wide and let the PVR video
;;                             scaler halve it 2:1 on framebuffer write
;;                             (horizontal SSAA). on widens the projected
;;                             canvas to 1280 so the whole scene shows; off
;;                             (default, legacy) keeps a 640 canvas, showing
;;                             only the LEFT HALF of the image in those games.)
;;   canvas_width    = 0 | 320..1280  (forced canvas width for 240p modes.
;;                             Some low-res games draw their scene narrower
;;                             than 640 and pad the rest with black filler,
;;                             so neither registers nor measurement reveal
;;                             the real width. This forces it, only while
;;                             the video mode is non-interlaced NTSC/PAL
;;                             (240p) — interlaced boot/logo screens keep
;;                             the 640 canvas. Street Fighter III / Double
;;                             Impact: 384 (CPS3 arcade width). 0 (default):
;;                             off.)
;;   split_screen    = on | off  (split-screen multiplayer. on honors the PVR User Tile
;;                             Clip — per-polygon inside-clip rects that games like
;;                             Daytona USA multiplayer use to confine each player's
;;                             camera to its half of the screen within one render
;;                             pass. Default off (legacy: clips ignored, both views
;;                             draw fullscreen and only one player's view shows).)
;;   mipmap          = off | fast | trilinear  (GX mipmap generation. off (default):
;;                             legacy base-level-only, fastest. fast: generated mip
;;                             chain sampled with nearest-mip bilinear — cuts distant
;;                             shimmer at near-zero GPU cost. trilinear: best quality
;;                             but takes 2 texture cycles/texel on Hollywood, halving
;;                             texture fill rate — e.g. -40% FPS in Test Drive 6.)
;;   fixed_depth     = 0 | 1 | 2  (fixed depth projection. 0 (default): legacy
;;                             per-vertex min/max W tracking, fits the Z range to
;;                             the scene each frame. 1 (wide): skips that tracking,
;;                             fixed planes W=[0.0001..100000] — safe everywhere,
;;                             coarser Z (more Z-fighting risk). 2 (tight): fixed
;;                             planes W=[0.1..25000] — much finer Z, but geometry
;;                             outside that range clips. UNVERIFIED on real
;;                             hardware — test per-game before relying on it.)
;;   depth_clip      = 0 | 1 | 2  (real-Wii Z-clip workaround. Dolphin never
;;                             Z-clips (it clamps), so geometry sitting on or
;;                             beyond the near/far plane — often the 2D UI,
;;                             which defines the dynamic near plane itself —
;;                             shows in Dolphin but vanishes on real hardware.
;;                             0 (default): legacy, XF clipping on, no margin.
;;                             1 (near margin): pads the near plane by 0.1% so
;;                             the nearest layer can't land exactly on it —
;;                             CONFIRMED on real Wii hardware, fixes ChuChu
;;                             Rocket and Crazy Taxi menu/intro with no
;;                             downside seen so far. 2 (no clip): disables XF
;;                             clipping entirely to fully match Dolphin —
;;                             regressed Crazy Taxi when combined with
;;                             fixed_depth=2 (tight), avoid that combo.)
;;   async_render    = on | off  (async GPU present. off (default): CPU blocks in
;;                             GX_DrawDone() until the GPU finishes each frame.
;;                             on: queues the frame and returns at once — the
;;                             SH4 core emulates the next frame while the GPU
;;                             draws, and the finished frame is presented at
;;                             the start of the next one. One frame of extra
;;                             display latency; large FPS gain whenever the
;;                             GPU takes a meaningful slice of the frame.
;;                             UNVERIFIED on real hardware — test per-game.)
;;   tmem_cache      = on | off  (persistent GPU texture cache. off (default):
;;                             invalidates the GPU's 1MB texture cache (TMEM)
;;                             every frame, re-fetching every texel from RAM.
;;                             on: invalidates only when a texture is actually
;;                             re-decoded, so unchanged textures stay cached
;;                             across frames — more texture fill rate.
;;                             UNVERIFIED on real hardware — test per-game.)
;;   cdda            = on | off  (CD audio (Red Book) music. off (default): the
;;                             AICA EXTS0 input stays silent, so games that
;;                             play music as CD audio tracks have no music.
;;                             on: streams the playing track's sectors from the
;;                             disc image (~75 reads/s) into the sound mix.
;;                             UNVERIFIED on real hardware — test per-game.)
;;   bg_poly         = on | off  (background polygon rendering. ISP_BACKGND_T's
;;                             3 vertices are normally only used for the EFB
;;                             clear color. on additionally barycentric-
;;                             extrapolates them into a full-screen textured/
;;                             Gouraud quad — needed by Who Wants to Be a
;;                             Millionaire's background — at the cost of an
;;                             extra texture bind + polygon draw every frame.
;;                             off (default): legacy, draws nothing extra.
;;                             Caused an FPS regression in other games when
;;                             left unconditionally on — enable per-game only.)
;;   hokuto_hack     = on | off  (layer-tiered translucent sort for 2D games
;;                             that submit the whole scene at ONE depth and
;;                             rely on PVR per-pixel autosort. Activates the
;;                             trans_sort machinery (implied, no need to set
;;                             trans_sort=on) and adds a tie tier at equal
;;                             depth: full-screen untextured REPLACE plates
;;                             draw first (background plates the game
;;                             expects autosort to bury), then VQ stage art
;;                             (ALL VQ — splitting VQ by address broke the
;;                             char select screen, keep VQ order legacy),
;;                             then 8bpp sprites on palette bank 32-47
;;                             (stage crowd), then everything else in
;;                             submission order — the backdrop can't erase
;;                             the fighters, while high-VRAM foreground VQ
;;                             (super auras, cut-ins, intro dust) and
;;                             fades/HUD keep painter compositing. Only the
;;                             full-screen plate tier is scene-gated (80+
;;                             VQ strips = battle); the VQ and crowd tiers
;;                             stay on unconditionally — gating those too
;;                             was tried and broke char select/
;;                             presentation (disabling crowd moved it into
;;                             the topmost tier instead of a neutral one).
;;                             off (default): submission order only —
;;                             Hokuto no Ken's backdrop covered its
;;                             fighters that way.)
;;   isp_depth_func  = 0 | 1 | 2  (per-polygon isp.DepthMode -> GX depth
;;                             compare. DIFFERENT from hokuto_hack above: this
;;                             honors each polygon's actual DepthMode register
;;                             instead of the fixed GEQUAL painter compare.
;;                             0=off (legacy), 1=honor DepthMode on the
;;                             opaque/PT lists only (translucent stays GEQUAL,
;;                             matching real PVR autosort), 2=all lists.
;;                             Experimental — off by default.)
;;   isp_cull        = 0 | 1 | 2  (per-polygon isp.CullMode -> GX backface
;;                             culling. 0=off (legacy: never cull), 1=on,
;;                             2=on with the two cullable windings swapped
;;                             (use if 1 makes geometry vanish / look
;;                             inside-out). Experimental — off by default.)
;;   audio_buffers   = 0 | 1 | 2 | 3 | default  (forces
;;                             settings.emulator.AudioBuffers, the AICA
;;                             audio queue depth — see nullDC.cpp
;;                             LoadSettings() and wii/wii_audio.cpp. 0:
;;                             never blocks, samples are dropped on
;;                             overrun. 1..3: blocks the emulation thread
;;                             each push until fewer than N buffers are
;;                             queued — smoother audio pacing at the cost of
;;                             emulation speed on games that burst audio.
;;                             default (alias: auto, saved): explicitly
;;                             resets it to the saved/cfg value, undoing a
;;                             [default] section override or a previous
;;                             game's setting from earlier this boot.
;;                             Leaving the key out of a section entirely
;;                             does the same thing UNLESS an earlier section
;;                             already forced it — 'default' guarantees the
;;                             reset regardless of what ran before.)
;;   sh4_clock       = 150..200  (SH4 underclock — effective SH4 core clock in
;;                             MHz, clamped to [150,200]. 200 (default) is
;;                             real-Dreamcast full speed. Lower values budget
;;                             fewer emulated SH4 cycles per audio/video/RTC
;;                             frame, so the Wii renders more frames per second
;;                             (smoother), at the cost of the emulated machine
;;                             acting like a slower Dreamcast — CPU-heavy games
;;                             drop internal frames. Audio stays in sync. A
;;                             pure performance knob — test per game.)
;;
;; EXAMPLE FILENAMES THAT WOULD MATCH:
;;   [jojo]        matches  JoJos_Bizarre_Adventure.gdi  or  jojo_dc.cdi
;;   [daytonausa]  matches  DaytonaUSA.gdi  or  daytona_usa_2001.cdi
;;
;; [default] IS SPECIAL:
;;   Not matched against any filename — its fields are applied first, on
;;   every launch, before the per-game section below is matched. Per-game
;;   sections only need to list the fields that differ from [default].
;;   It is pre-filled here with the emulator's built-in (out-of-the-box)
;;   defaults, so editing it changes the baseline for every game at once.
;; --------------------------------------------------------------------------

[default]
accuracy=fast ; testing FAST as default in alpha0.52
graphics=normal
ratio=auto
adv_alpha=on
frameskip=0
tex_cache=normal
ppz_write=on
x_scaler=on
canvas_width=0
4bpp=4bpp_optimized
8bpp=8bpp_optimized
players=4
controller=standard
framebuffer_2d=off
fmv_format=rgb565
jojo_fix=off
decal_alpha=off
speed_limiter=off
vertex_color_fix=on
blend_mode=on
rgb565_opaque_alpha=off
fps_boost=off
punch_through=off
offset_color=on
trans_sort=off
render_to_texture=off
split_screen=off
mipmap=off
seam_fix=on
fixed_depth=0
depth_clip=1
async_render=on
tmem_cache=off
bg_poly=off
hokuto_hack=off
isp_depth_func=0
isp_cull=0
sh4_clock=200 ; SH4 core clock in MHz (150..200); 200=full speed, lower=faster host/slower game


