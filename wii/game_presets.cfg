accuracy=balanced

; ============================================================
; LIGHT GUN GAMES
; ============================================================

[confidential_mission]
controller=lightgun
accuracy=balanced

[house_of_the_dead]
controller=lightgun
accuracy=fast
graphics=low

[virtua_cop]
controller=lightgun
accuracy=fast
graphics=low

[death_crimson]
controller=lightgun
accuracy=fast

