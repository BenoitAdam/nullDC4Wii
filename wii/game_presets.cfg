;; NullDC4Wii - Game Presets Configuration
;; Place this file at: sd:/data/game_presets.cfg
;;
;; HOW IT WORKS:
;;   Each [keyword] is matched case-insensitively as a substring of the disc filename.
;;   The FIRST matching rule wins — put more specific entries BEFORE general ones.
;;   Only fields you list are changed; everything else keeps the user's UI selection.
;;   The options menu opens AFTER the preset is applied, so users can still override.
;;
;; SETTINGS REFERENCE:
;;   accuracy    = fast | balanced | accurate
;;   graphics    = low | normal | high | extra
;;   ratio       = original | fullscreen
;;   adv_alpha   = 0 | 1
;;   frameskip   = 0 | 1 | 2 | auto
;;   tex_cache   = very_fast | fast | normal | quality
;;   4bpp        = i4_stub | i4_grey | ci4_fast | ci4_normal | rgb565
;;   8bpp        = i8_stub | i8_grey | ci8_fast | ci8_normal | rgb565
;;   players     = 1 | 2
;;   controller  = standard | lightgun | maracas | keyboard | fishingrod
;;
;; EXAMPLE FILENAMES THAT WOULD MATCH:
;;   [jojo]        matches  JoJos_Bizarre_Adventure.gdi  or  jojo_dc.cdi
;;   [daytonausa]  matches  DaytonaUSA.gdi  or  daytona_usa_2001.cdi
;; --------------------------------------------------------------------------

; ============================================================
; 2D FIGHTERS / BEAT EM UPS  (low graphics, fast is fine)
; ============================================================

[jojo]
graphics=low
4bpp=rgb565
8bpp=rgb565

[marvel]
graphics=low
4bpp=rgb565
8bpp=rgb565

[capcomvs]
accuracy=fast
4bpp=rgb565
8bpp=rgb565

[streetfighter]
graphics=low
4bpp=rgb565
8bpp=rgb565

[powerstone]
4bpp=rgb565
8bpp=i8_stub

; ============================================================
; RACING GAMES  (balanced, may need frameskip)
; ============================================================

[daytonausa]
graphics=normal
4bpp=rgb565
8bpp=i8_stub

[crazytaxi2]   ; more specific first!
graphics=normal
4bpp=rgb565
8bpp=rgb565

[crazytaxi]
graphics=normal
4bpp=rgb565
8bpp=rgb565

; ============================================================
; SONIC / PLATFORMERS
; ============================================================

[sonicadventure2]          ; more specific first!
accuracy=accurate ; example untested
graphics=high ; example untested

[sonicadventure]
accuracy=accurate ; example untested
graphics=normal ; example untested

; ============================================================
; RPGs  (accurate, no frameskip needed)
; ============================================================


; ============================================================
; SHOOTERS / SHMUPS  (low graphics for max FPS)
; ============================================================


; ============================================================
; SPECIAL CONTROLLERS
; ============================================================

[sambadeamigo]
controller=maracas
players=2

[samba_de_amigo]
controller=maracas
players=2

[typing of the dead]
controller=keyboard
players=2
accuracy=balanced

[sega_bass_fishing]
